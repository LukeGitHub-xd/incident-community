inclined-platform/
├── docker-compose.yml
├── .env
├── postgres/
│   ├── init/
│   │   └── 01-init.sql
│   └── data/

mkdir -p postgres/init
mkdir -p postgres/data

touch .env

POSTGRES_DB=inclined_db
POSTGRES_USER=inclined
POSTGRES_PASSWORD=Inclined@123456
POSTGRES_PORT=5432


version: "3.9"

services:
  postgres:
    image: postgres:17.8
    container_name: inclined-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  inclined-api:
    image: inclined-api:latest
    container_name: inclined-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      LICENSE_PATH: /app/license/license.lic
    volumes:
      - ./license:/app/license
      - ./data:/app/data
    ports:
      - "8024:8024"