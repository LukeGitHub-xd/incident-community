<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI事故分析 Demo</title>

    <style>

        body{
            font-family:Arial;
            max-width:900px;
            margin:40px auto;
        }

        textarea{
            width:100%;
            height:200px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            margin-top:10px;
        }

        #result{
            margin-top:30px;
            padding:20px;
            background:#f6f6f6;
            border-radius:6px;
        }

    </style>

</head>

<body>

<h2>AI 5 秒分析生产事故</h2>

<p>粘贴日志 → 自动生成事故报告</p>

<textarea id="log">

2026-03-08 15:05:09 ERROR GlobalExceptionHandler
BusinessException: 该业务功能已绑定流程

</textarea>

<br>

<button onclick="analyze()">开始AI分析</button>

<div id="result"></div>

<script>

    function analyze(){

        let log=document.getElementById("log").value

        fetch("http://localhost:8080/demo/analyze",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({log:log})
        })
            .then(res=>res.json())
            .then(data=>{

                let root=data.rootCause?.join("<br>")||"无"

                let suspected=data.suspected?.join("<br>")||"无"

                document.getElementById("result").innerHTML=`

<h3>🚨 AI事故分析报告</h3>

<p><b>严重等级：</b>${data.severity}</p>

<p><b>建议动作：</b>${data.action}</p>

<p><b>可信度：</b>${data.confidence}</p>

<h4>确认根因</h4>

${root}

<h4>疑似根因</h4>

${suspected}

`

            })

    }

</script>

</body>
</html>
