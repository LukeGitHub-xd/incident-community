
# 禁用 JPA/Hibernate 自动配置
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# 或者使用更简单的方式，配置一个内存数据库（如果某些组件仍然需要数据源）
# datasource:
#   url: jdbc:h2:mem:testdb
#   driver-class-name: org.h2.Driver
#   username: sa
#   password: 
# jpa:
#   database-platform: org.hibernate.dialect.H2Dialect
#   hibernate:
#     ddl-auto: none
#   show-sql: false

incident:
  loki:
    base-url: http://116.233.96.74:33100
    label-mapping:
      service: service_name
      env: service
  notify:
    wecom:
      webhook: ${WECOM_WEBHOOK:}
      enabled: false
    slack:
      webhook: ${SLACK_WEBHOOK:}
      enabled: false
    dingtalk:
      webhook: ${DINGTALK_WEBHOOK:}
      enabled: false
    feishu:
      webhook: ${FEISHU_WEBHOOK:}
      enabled: false

  rule:
    scan-interval-seconds: ${INCIDENT_SCAN_INTERVAL:30}
    mode: ${INCIDENT_MODE:auto}
  services: order-server,admin-server
  rules:
    # 默认规则
    - name: default-high-error
      priority: 100
      enabled: true
      match:
        services: ["*"]
      when:
        all:
          - field: errorRate
            op: gt
            value: 5
      severity: P2

    # 指定服务组
    - name: core-service-critical
      priority: 200
      enabled: true
      match:
        services: ["aa-*"]
      when:
        all:
          - field: env
            op: eq
            value: dev
          - field: errorRate
            op: gt
            value: 3
      severity: P1

    # 正则匹配
    - name: memory-oom
      priority: 300
      enabled: true
      match:
        servicesRegex: ".*-service"
      when:
        any:
          - field: log
            op: contains
            value: OutOfMemoryError
      severity: P0
